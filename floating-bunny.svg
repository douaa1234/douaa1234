<svg width="220" height="120" viewBox="0 0 220 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Floating bunny</title>
  <desc id="desc">A soft animated pastel bunny floating on a cloud with tiny sparkles.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#B77AE8" flood-opacity="0.18" />
    </filter>
  </defs>

  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -4;0 0" dur="5s" repeatCount="indefinite" />

    <g filter="url(#shadow)">
      <ellipse cx="112" cy="84" rx="54" ry="20" fill="#FFF8FD" />
      <ellipse cx="78" cy="86" rx="22" ry="14" fill="#FFF8FD" />
      <ellipse cx="145" cy="86" rx="24" ry="15" fill="#FFF8FD" />
    </g>

    <g transform="translate(78 18)">
      <ellipse cx="20" cy="30" rx="7" ry="20" fill="#FFE3F1" stroke="#E8B9D3" />
      <ellipse cx="40" cy="30" rx="7" ry="20" fill="#FFE3F1" stroke="#E8B9D3" />
      <ellipse cx="20" cy="32" rx="13" ry="28" fill="#FFFDFE" stroke="#E9DDF4" />
      <ellipse cx="40" cy="32" rx="13" ry="28" fill="#FFFDFE" stroke="#E9DDF4" />
      <circle cx="30" cy="54" r="24" fill="#FFFDFE" stroke="#E9DDF4" />
      <circle cx="22" cy="52" r="2.2" fill="#5D4A75" />
      <circle cx="38" cy="52" r="2.2" fill="#5D4A75" />
      <ellipse cx="30" cy="59" rx="3.5" ry="2.4" fill="#F1A9C8" />
      <path d="M26 64C27.8 66 29 66.8 30 66.8C31 66.8 32.2 66 34 64" stroke="#7C6B91" stroke-width="1.8" stroke-linecap="round" />
      <circle cx="13" cy="60" r="3.8" fill="#FFD9EA" fill-opacity="0.8" />
      <circle cx="47" cy="60" r="3.8" fill="#FFD9EA" fill-opacity="0.8" />
    </g>
  </g>

  <path d="M24 28L26.8 34.2L33 37L26.8 39.8L24 46L21.2 39.8L15 37L21.2 34.2L24 28Z" fill="#D89BFF">
    <animate attributeName="opacity" values="0.25;1;0.25" dur="4.2s" repeatCount="indefinite" />
  </path>
  <path d="M192 18L194.6 24.4L201 27L194.6 29.6L192 36L189.4 29.6L183 27L189.4 24.4L192 18Z" fill="#BFD2FF">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="4.8s" repeatCount="indefinite" />
  </path>
  <circle cx="176" cy="72" r="4" fill="#FFD6E7">
    <animate attributeName="cy" values="72;68;72" dur="5.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.3;0.95;0.3" dur="5.5s" repeatCount="indefinite" />
  </circle>
